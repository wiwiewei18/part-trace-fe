name: CI

on:
  pull_request:
    branches: [development, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npx playwright install --with-deps
      - run: npm run test
      - run: npm run build
